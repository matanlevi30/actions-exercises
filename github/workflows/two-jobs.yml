name: Two Jobs Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Start checks
        run: echo "Running checks..."

      - name: Wait for 5 seconds
        run: sleep 5

      - name: Finish checks
        run: echo "Checks passed!"

  deploy:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - name: Start deploy
        run: echo "Deploying..."

      - name: Finish deploy
        run: echo "Deploy complete!"
